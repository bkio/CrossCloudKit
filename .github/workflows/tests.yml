name: Update Test Badge

on:
  push:
    branches: [ main ]

jobs:
  test-and-publish:
    runs-on: [self-hosted, amd64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: Fetch LFS objects
        run: git lfs pull

      - name: Validate LFS files
        run: |
          echo "Checking GGUF model files are real binaries (not LFS pointer stubs)..."
          for f in CrossCloudKit.LLM.Basic.Completion/models/SmolLM2-135M-Instruct-Q8_0.gguf \
                   CrossCloudKit.LLM.Basic.Embeddings/models/snowflake-arctic-embed-m-long-Q8_0.gguf; do
            size=$(stat --printf="%s" "$f" 2>/dev/null || echo 0)
            if [ "$size" -lt 1000000 ]; then
              echo "ERROR: $f is only $size bytes — likely an LFS pointer stub."
              echo "Content: $(head -c 200 "$f")"
              exit 1
            fi
            echo "OK: $f ($size bytes)"
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build solution
        run: dotnet build CrossCloudKit.sln --configuration Release

      - name: Run tests and generate report
        id: test
        run: |
          dotnet test CrossCloudKit.sln --configuration Release --verbosity normal --logger:"trx" --results-directory TestResults -- RunConfiguration.MaxCpuCount=1
        env:
          # AWS Configuration
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

          # Google Cloud Configuration
          GOOGLE_BASE64_CREDENTIALS: ${{ secrets.GOOGLE_BASE64_CREDENTIALS }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_TEST_BUCKET: ${{ secrets.GOOGLE_CLOUD_TEST_BUCKET }}

          # MongoDB Configuration
          MONGODB_CONNECTION_STRING: ${{ secrets.MONGODB_CONNECTION_STRING }}

          # Redis Configuration
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}

          # S3 Compatible Storage Configuration
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_SERVER_ADDRESS: ${{ secrets.S3_SERVER_ADDRESS }}

          # LLM / Vector configuration (cluster-local endpoints, no secrets needed)
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_EMBEDDING_MODEL: ${{ secrets.OPENAI_EMBEDDING_MODEL }}
          OPENAI_API_KEY: ""
          QDRANT_HOST: ${{ secrets.QDRANT_HOST }}
          QDRANT_PORT: ${{ secrets.QDRANT_PORT }}
        continue-on-error: true

      - name: Parse test results and create badge
        run: |
          # Install xmlstarlet for XML parsing
          sudo apt-get update && sudo apt-get install -y xmlstarlet

          # Find TRX files
          echo "Looking for TRX files..."
          find TestResults -name "*.trx" -type f || echo "No TRX files found"
          ls -la TestResults/ || echo "TestResults directory not found"

          # Process all TRX files and aggregate results
          total_tests=0
          passed_tests=0
          failed_tests=0

          for trx_file in TestResults/*.trx; do
            if [ -f "$trx_file" ]; then
              echo "Processing TRX file: $trx_file"

              # Debug: Show file size and first few lines
              echo "File size: $(wc -c < "$trx_file") bytes"
              echo "First 10 lines of TRX file:"
              head -10 "$trx_file"
              echo "---"

              # Try to extract namespace and root element
              echo "XML structure:"
              xmlstarlet el "$trx_file" | head -10 || echo "Failed to parse XML structure"

              # Try different parsing methods
              file_total=$(xmlstarlet sel -N mstest="http://microsoft.com/schemas/VisualStudio/TeamTest/2010" -t -v "//mstest:Counters/@total" "$trx_file" 2>/dev/null || \
                          xmlstarlet sel -t -v "//Counters/@total" "$trx_file" 2>/dev/null || \
                          xmlstarlet sel -t -v "//*[local-name()='Counters']/@total" "$trx_file" 2>/dev/null || \
                          xmlstarlet sel -t -v "count(//*[local-name()='UnitTestResult'])" "$trx_file" 2>/dev/null || echo "0")

              file_passed=$(xmlstarlet sel -N mstest="http://microsoft.com/schemas/VisualStudio/TeamTest/2010" -t -v "//mstest:Counters/@passed" "$trx_file" 2>/dev/null || \
                           xmlstarlet sel -t -v "//Counters/@passed" "$trx_file" 2>/dev/null || \
                           xmlstarlet sel -t -v "//*[local-name()='Counters']/@passed" "$trx_file" 2>/dev/null || \
                           xmlstarlet sel -t -v "count(//*[local-name()='UnitTestResult'][@outcome='Passed'])" "$trx_file" 2>/dev/null || echo "0")

              file_failed=$(xmlstarlet sel -N mstest="http://microsoft.com/schemas/VisualStudio/TeamTest/2010" -t -v "//mstest:Counters/@failed" "$trx_file" 2>/dev/null || \
                           xmlstarlet sel -t -v "//Counters/@failed" "$trx_file" 2>/dev/null || \
                           xmlstarlet sel -t -v "//*[local-name()='Counters']/@failed" "$trx_file" 2>/dev/null || \
                           xmlstarlet sel -t -v "count(//*[local-name()='UnitTestResult'][@outcome='Failed'])" "$trx_file" 2>/dev/null || echo "0")

              echo "File results - Total: $file_total, Passed: $file_passed, Failed: $file_failed"

              # Add to totals
              total_tests=$((total_tests + file_total))
              passed_tests=$((passed_tests + file_passed))
              failed_tests=$((failed_tests + file_failed))

              echo "Running totals - Total: $total_tests, Passed: $passed_tests, Failed: $failed_tests"
              echo "---"
            fi
          done

          echo "Final test results:"
          echo "Total tests: $total_tests"
          echo "Passed tests: $passed_tests"
          echo "Failed tests: $failed_tests"

          # Determine badge color and message
          if [ "$total_tests" -gt "0" ] && [ "$failed_tests" -eq "0" ]; then
            color="brightgreen"
            message="${passed_tests}%2F${total_tests}%20passing"
          elif [ "$total_tests" -gt "0" ] && [ "$failed_tests" -gt "0" ]; then
            color="red"
            message="${failed_tests}%2F${total_tests}%20failing"
          else
            color="orange"
            message="no%20tests"
          fi

          # Create badge URL
          badge_url="https://img.shields.io/badge/Tests-${message}-${color}"

          echo "BADGE_URL=$badge_url" >> $GITHUB_ENV
          echo "TEST_STATUS=${passed_tests}/${total_tests}" >> $GITHUB_ENV
          echo "TOTAL_TESTS=$total_tests" >> $GITHUB_ENV
          echo "PASSED_TESTS=$passed_tests" >> $GITHUB_ENV
          echo "FAILED_TESTS=$failed_tests" >> $GITHUB_ENV

          # Set flag for publishing decision (allow up to 10 failing tests)
          if [ "$total_tests" -gt "0" ] && [ "$failed_tests" -le "10" ]; then
            echo "TESTS_PASSED=true" >> $GITHUB_ENV
          else
            echo "TESTS_PASSED=false" >> $GITHUB_ENV
          fi

      - name: Update README with test badge and results
        run: |
          echo "Badge URL: $BADGE_URL"

          # Remove any existing test badge
          sed -i '/!\[Tests\]/d' README.md

          # Add the new test badge after the .NET badge line - escape the URL properly
          escaped_url=$(printf '%s\n' "$BADGE_URL" | sed 's/[[\.*^$(){}?+|]/\\&/g')
          sed -i '/!\[\.NET 8\]/a ![Tests]('"$escaped_url"')' README.md

          # Create test results section
          current_date=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Remove existing test results section if it exists
          sed -i '/## Test Results/,/^## /{ /^## Test Results/d; /^## /!d; }' README.md

          # Create test results section using a here-doc
          cat > test_results.tmp << EOF
          ## Test Results

          **Last Updated:** $current_date

          | Metric | Count |
          |--------|-------|
          | ✅ **Tests Passed** | **$PASSED_TESTS** |
          | ❌ **Tests Failed** | **$FAILED_TESTS** |
          | 📊 **Total Tests** | **$TOTAL_TESTS** |

          EOF

          sed -i '/CrossCloudKit is a comprehensive/r test_results.tmp' README.md

          # Clean up temporary file
          rm test_results.tmp

          echo "Updated README with test status: $TEST_STATUS"
          echo "Test Results: Passed=$PASSED_TESTS, Failed=$FAILED_TESTS, Total=$TOTAL_TESTS"

          # Show the updated badge and results section
          head -20 README.md

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add README.md
            git commit -m "Update test results: $PASSED_TESTS passed, $FAILED_TESTS failed, $TOTAL_TESTS total"
            git push
          fi

      - name: Generate version number
        if: env.TESTS_PASSED == 'true'
        run: |
          # Generate version based on date and run number
          DATE_VERSION=$(date +%Y.%m.%d)
          PACKAGE_VERSION="${DATE_VERSION}.${{github.run_number}}"

          echo "Generated version: $PACKAGE_VERSION"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: Pack NuGet packages
        if: env.TESTS_PASSED == 'true'
        run: |
          echo "All tests passed! Creating NuGet packages with version $PACKAGE_VERSION..."

          # ── Explicit project list ─────────────────────────────────────────────
          # Projects that ship as NuGet packages. Test projects and shared test
          # helpers are intentionally excluded.
          # LLM.Basic is marked as CPU-ONLY PLUG & PLAY: consumers get the
          # snowflake-arctic-embed-m-long embedding model (via LLamaSharp)
          # and the LLamaSharp CPU backend automatically as transitive dependencies.
          projects_to_pack=(
            # Core
            "./CrossCloudKit.Interfaces/CrossCloudKit.Interfaces.csproj"

            # Database services
            "./CrossCloudKit.Database.AWS/CrossCloudKit.Database.AWS.csproj"
            "./CrossCloudKit.Database.Mongo/CrossCloudKit.Database.Mongo.csproj"
            "./CrossCloudKit.Database.GC/CrossCloudKit.Database.GC.csproj"
            "./CrossCloudKit.Database.Basic/CrossCloudKit.Database.Basic.csproj"

            # File storage services
            "./CrossCloudKit.File.AWS/CrossCloudKit.File.AWS.csproj"
            "./CrossCloudKit.File.GC/CrossCloudKit.File.GC.csproj"
            "./CrossCloudKit.File.S3Compatible/CrossCloudKit.File.S3Compatible.csproj"
            "./CrossCloudKit.File.Basic/CrossCloudKit.File.Basic.csproj"
            "./CrossCloudKit.File.Common.MonitorBasedPubSub/CrossCloudKit.File.Common.MonitorBasedPubSub.csproj"

            # PubSub services
            "./CrossCloudKit.PubSub.AWS/CrossCloudKit.PubSub.AWS.csproj"
            "./CrossCloudKit.PubSub.GC/CrossCloudKit.PubSub.GC.csproj"
            "./CrossCloudKit.PubSub.Redis/CrossCloudKit.PubSub.Redis.csproj"
            "./CrossCloudKit.PubSub.Basic/CrossCloudKit.PubSub.Basic.csproj"

            # Memory / caching services
            "./CrossCloudKit.Memory.Redis/CrossCloudKit.Memory.Redis.csproj"
            "./CrossCloudKit.Memory.Redis.Common/CrossCloudKit.Memory.Redis.Common.csproj"
            "./CrossCloudKit.Memory.Basic/CrossCloudKit.Memory.Basic.csproj"

            # LLM services
            # LLM.OpenAI  — works with any OpenAI-compatible endpoint (Ollama, Groq, Azure, etc.)
            "./CrossCloudKit.LLM.OpenAI/CrossCloudKit.LLM.OpenAI.csproj"
            # LLM.Basic sub-packages — CPU-only, plug & play:
            #   .Embeddings  bundles snowflake-arctic-embed-m-long (Q8_0) via LLamaSharp.Backend.Cpu
            #   .Completion  bundles SmolLM2-135M-Instruct (Q8_0, ~139 MB) + LLamaSharp.Backend.Cpu
            #   LLM.Basic    meta-package: depends on both sub-packages, exposes combined LLMServiceBasic
            "./CrossCloudKit.LLM.Basic.Embeddings/CrossCloudKit.LLM.Basic.Embeddings.csproj"
            "./CrossCloudKit.LLM.Basic.Completion/CrossCloudKit.LLM.Basic.Completion.csproj"
            "./CrossCloudKit.LLM.Basic/CrossCloudKit.LLM.Basic.csproj"

            # Vector store services
            "./CrossCloudKit.Vector.Basic/CrossCloudKit.Vector.Basic.csproj"
            "./CrossCloudKit.Vector.Qdrant/CrossCloudKit.Vector.Qdrant.csproj"

            # Debug panel
            "./CrossCloudKit.Basic.DebugPanel/CrossCloudKit.Basic.DebugPanel.csproj"

            # Utilities
            "./CrossCloudKit.Utilities.Common/CrossCloudKit.Utilities.Common.csproj"
            "./CrossCloudKit.Utilities.Windows/CrossCloudKit.Utilities.Windows.csproj"
          )

          echo "Projects to pack:"
          printf '  %s\n' "${projects_to_pack[@]}"
          echo ""

          pack_count=0
          for project in "${projects_to_pack[@]}"; do
            if [ ! -f "$project" ]; then
              echo "⚠️  Skipping (not found): $project"
              continue
            fi
            echo "Packing: $project"
            dotnet pack "$project" --configuration Release --output ./nupkgs --no-build -p:PackageVersion=$PACKAGE_VERSION
            if [ $? -eq 0 ]; then
              pack_count=$((pack_count + 1))
              echo "✅ Successfully packed: $project"
            else
              echo "❌ Failed to pack: $project"
            fi
            echo ""
          done

          echo "Successfully packed $pack_count packages with version $PACKAGE_VERSION"
          echo "Created packages:"
          ls -la ./nupkgs/

      - name: Publish to NuGet
        if: env.TESTS_PASSED == 'true'
        run: |
          echo "Publishing packages to NuGet.org..."

          # Publish all packages
          for package in ./nupkgs/*.nupkg; do
            echo "Publishing $package..."
            dotnet nuget push "$package" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

          echo "Successfully published all packages to NuGet!"

      - name: Publish summary
        if: env.TESTS_PASSED == 'true'
        run: |
          echo "✅ Tests passed and packages published to NuGet!"
          echo "Test Results: $TEST_STATUS"
          echo "Package Version: $PACKAGE_VERSION"
          echo "Packages published: $(ls ./nupkgs/*.nupkg | wc -l)"
          echo ""
          echo "Published packages:"
          ls ./nupkgs/*.nupkg | sed 's|./nupkgs/||' | sed 's|\.nupkg||'
